name: Laravel CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  laravel-tests:
    runs-on: ubuntu-latest

    steps:
      - name: 1. Descargar código
        uses: actions/checkout@v4

      - name: 2. Configurar PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, dom, curl, libxml, sqlite3

      - name: 3. Instalar Dependencias (Composer)
        run: composer install --no-ansi --no-interaction --no-scripts --no-progress --prefer-dist

      - name: 4. Preparar Entorno (.env)
        run: |
          php -r "file_exists('.env') || copy('.env.example', '.env');"
          php artisan key:generate

      - name: 5. Crear Base de Datos SQLite (CI)
        run: |
          mkdir -p database
          touch database/database.sqlite

      - name: 6. Ejecutar Tests de Laravel (Unitaria e Integración)
        run: php artisan test